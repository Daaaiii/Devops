AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Infraestrutura de rede - VPC, subrede pública, Internet Gateway e tabela de rotas
  para o projeto DevOps Fase 1 - PUCRS.

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - production
      - staging
      - development
    Description: Ambiente de deploy

  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: Bloco CIDR da VPC
    AllowedPattern: '(\d{1,3}\.){3}\d{1,3}/\d{1,2}'

  PublicSubnetCIDR:
    Type: String
    Default: 10.0.1.0/24
    Description: Bloco CIDR da subrede pública
    AllowedPattern: '(\d{1,3}\.){3}\d{1,3}/\d{1,2}'

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-devops-vpc'
        - Key: Project
          Value: DevOps-Fase1
        - Key: Environment
          Value: !Ref Environment

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-devops-igw'
        - Key: Project
          Value: DevOps-Fase1

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PublicSubnetCIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-devops-public-subnet'
        - Key: Project
          Value: DevOps-Fase1

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-devops-public-rt'
        - Key: Project
          Value: DevOps-Fase1

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet

Outputs:
  VPCId:
    Description: ID da VPC criada
    Value: !Ref VPC
    Export:
      Name: !Sub '${AWS::StackName}-VPCId'

  PublicSubnetId:
    Description: ID da subrede pública
    Value: !Ref PublicSubnet
    Export:
      Name: !Sub '${AWS::StackName}-PublicSubnetId'

  VPCCidr:
    Description: Bloco CIDR da VPC
    Value: !GetAtt VPC.CidrBlock
    Export:
      Name: !Sub '${AWS::StackName}-VPCCidr'
