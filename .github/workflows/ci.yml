name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    name: Lint, Test & Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Lint — validar HTML
        run: npm run lint

      - name: Testes unitários com cobertura
        run: npm test

      - name: Auditoria de segurança
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Publicar relatório de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  iac-validation:
    name: Validação IaC — CloudFormation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar cfn-lint
        run: pip install cfn-lint

      - name: Validar templates CloudFormation
        run: |
          echo "Validando templates em infrastructure/cloudformation/"
          for template in network.yaml storage.yaml compute.yaml main.yaml; do
            cfn-lint infrastructure/cloudformation/$template || {
              code=$?
              # exit code 4 = apenas warnings (não bloqueante)
              # exit code 2 ou 6 = erros reais (bloqueia o pipeline)
              [ $code -eq 4 ] && echo "⚠ $template: warnings encontrados (não bloqueantes)" || exit $code
            }
          done
          echo "Todos os templates são válidos."

      - name: Verificar estrutura dos templates
        run: |
          echo "Verificando presença dos templates obrigatórios..."
          for template in network.yaml storage.yaml compute.yaml main.yaml; do
            if [ -f "infrastructure/cloudformation/$template" ]; then
              echo "✓ $template encontrado"
            else
              echo "✗ $template NÃO encontrado" && exit 1
            fi
          done

  deploy:
    name: Deploy — S3 Static Hosting
    runs-on: ubuntu-latest
    needs: [ci, iac-validation]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Build da imagem Docker (multi-stage)
        run: docker build -t devops-app .

      - name: Configurar credenciais AWS (Learner Lab)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy stack CloudFormation — storage
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/cloudformation/storage.yaml \
            --stack-name devops-fase1-storage \
            --parameter-overrides BucketNameSuffix=devops-pucrs \
            --region ${{ secrets.AWS_REGION }} \
            --no-fail-on-empty-changeset

      - name: Obter nome do bucket via output do CloudFormation
        id: bucket
        run: |
          BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name devops-fase1-storage \
            --query "Stacks[0].Outputs[?OutputKey=='WebsiteBucketName'].OutputValue" \
            --output text \
            --region ${{ secrets.AWS_REGION }})
          echo "name=$BUCKET_NAME" >> $GITHUB_OUTPUT

      - name: Deploy para S3 — hospedagem estática
        run: |
          aws s3 sync . s3://${{ steps.bucket.outputs.name }} \
            --exclude "*" \
            --include "index.html" \
            --delete \
            --region ${{ secrets.AWS_REGION }}

      - name: Exibir URL do site
        run: |
          echo "Site publicado em: http://${{ steps.bucket.outputs.name }}.s3-website-${{ secrets.AWS_REGION }}.amazonaws.com"
